<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pawffles</title>
  <style>
    :root {
      --bg: #FDF6EE;
      --surface: #FFF8F0;
      --text: #5C3317;
      --accent: #C97B3A;
      --border: #F2A65A;
    }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }
    .card {
      max-width: 480px;
      width: 100%;
      background: var(--surface);
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: 0 6px 24px rgba(92, 51, 23, 0.08);
      text-align: center;
    }
    h1 {
      font-size: 32px;
      letter-spacing: -0.5px;
      margin: 0 0 4px;
    }
    p {
      font-size: 15px;
      opacity: 0.75;
      margin: 0 0 24px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    a.btn {
      display: block;
      background: var(--bg);
      border: 1.5px solid var(--border);
      color: var(--accent);
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 15px;
    }
    a.btn:hover { background: var(--border); color: white; }
    footer { margin-top: 24px; font-size: 12px; opacity: 0.55; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Pawffles</h1>
    <p>Quick flips. Cute matches.</p>
    <div class="links">
      <a class="btn" href="privacy-es.html">Política de privacidad (Español)</a>
      <a class="btn" href="privacy-en.html">Privacy Policy (English)</a>
    </div>
    <footer>© 2026 Mathías López</footer>
  </div>
</body>
</html>
